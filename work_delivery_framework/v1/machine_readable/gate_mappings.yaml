  - kind: gate_mapping
    id: RULE-GATE-7-CRITICAL-ARTIFACTS
    gate_id: GATE-TRANSITION-COMPLETE
    persistent_critical_artifacts:
      - ARTIFACT-PROJECT-BRIEF
